version: "3"
services:
  umbrel:
    image: dockurr/umbrel:latest
    container_name: umbrel
    network_mode: bridge
    ports:
      - 7080:80
    volumes:
      - /home/portainer/umbrel:/data
      - /var/run/docker.sock:/var/run/docker.sock # Necessario para o Umbrel gerenciar seus apps
    environment:
      - NGINX_PORT=80
    restart: always
    stop_grace_period: 1m
